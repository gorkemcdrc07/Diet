name: Ogun Hatirlaticilari

on:
  schedule:
    # Turkiye saati 10:03
    - cron: "3 7 * * *"

    # Turkiye saati 12:03
    - cron: "3 9 * * *"

    # Turkiye saati 14:03
    - cron: "3 11 * * *"

    # Turkiye saati 15:03
    - cron: "3 12 * * *"

    # Turkiye saati 16:03
    - cron: "3 13 * * *"

    # Turkiye saati 18:33
    - cron: "33 15 * * *"

    # Turkiye saati 21:03
    - cron: "3 18 * * *"

  workflow_dispatch:
    inputs:
      ogun:
        description: "Test edilecek ogunu sec"
        required: true
        default: "uyandiginda"
        type: choice
        options:
          - uyandiginda
          - sabah
          - ara-ogun-1
          - ogle
          - ara-ogun-2
          - aksam
          - yatmadan-once

jobs:
  bildirim-gonder:
    name: Ogun bildirimini gonder
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Projeyi indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Paketleri yukle
        run: npm ci

      - name: Bildirimi gonder
        run: npm run hatirlatici:gonder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          MANUEL_OGUN_ID: ${{ github.event.inputs.ogun }}